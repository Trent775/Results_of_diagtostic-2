<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytic Matrix | Профиль</title>
    <!-- Только CryptoJS, никаких других зависимостей -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #f5f5f2;
            --bg-card: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.06);
            --text-main: #111111;
            --text-muted: #555555;
            
            --color-blue: #2563eb;
            --color-red: #dc2626;
            --color-green: #059669;
            --color-orange: #d97706;
            
            --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.04);
            --shadow-inset: inset 0 2px 4px rgba(0,0,0,0.02);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 960px;
        }

        /* --- ЭКРАН АВТОРИЗАЦИИ --- */
        #auth-view {
            max-width: 400px;
            margin: 15vh auto 0;
            position: relative;
        }

        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-float);
        }

        .auth-logo {
            width: 48px; height: 48px;
            background: var(--text-main);
            color: #fff;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 18px;
            margin: 0 auto 24px;
        }

        .auth-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .auth-subtitle { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }

        .input-token {
            width: 100%; padding: 14px;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px; text-align: center;
            outline: none; transition: var(--transition-smooth);
            box-shadow: var(--shadow-inset);
        }
        .input-token:focus { border-color: var(--text-main); }

        .btn-submit {
            width: 100%; padding: 14px; margin-top: 16px;
            background: var(--text-main); color: #fff;
            border: none; border-radius: 8px;
            font-weight: 600; font-size: 14px;
            cursor: pointer; transition: var(--transition-smooth);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }

        .error-message {
            margin-top: 16px; padding: 12px;
            background: #fef2f2; color: var(--color-red);
            border-radius: 8px; font-size: 13px; font-weight: 500;
            text-align: center; display: none;
        }

        /* --- ЭКРАН ПРОФИЛЯ --- */
        #profile-view { display: none; }

        .nav-bar { margin-bottom: 24px; }
        .btn-back {
            background: none; border: none;
            color: var(--text-muted); font-weight: 600; font-size: 13px;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: color 0.2s;
        }
        .btn-back:hover { color: var(--text-main); }

        .hero-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px; padding: 40px; margin-bottom: 24px;
            position: relative; overflow: hidden;
            box-shadow: var(--shadow-float);
        }
        .hero-section::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--color-blue), var(--color-green), var(--color-orange), var(--color-red));
        }

        .profile-name { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
        .profile-role { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-top: 8px; }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        @media (max-width: 850px) { .grid-layout { grid-template-columns: 1fr; } }

        .content-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px; padding: 32px;
            box-shadow: var(--shadow-float);
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .content-card.visible { opacity: 1; transform: translateY(0); }

        .card-title {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--text-muted);
            margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 10px;
        }
        .indicator { width: 8px; height: 8px; border-radius: 50%; }
        .ind-blue { background: var(--color-blue); }
        .ind-red { background: var(--color-red); }
        .ind-green { background: var(--color-green); }
        .ind-orange { background: var(--color-orange); }
        .ind-gray { background: #ccc; }

        /* Типографика внутри карточек */
        .rich-text { max-width: 680px; font-size: 15px; color: #222; }
        .rich-text p { margin-bottom: 16px; }
        .rich-text p:last-child { margin-bottom: 0; }
        
        .rich-text ul, .rich-text ol { margin: 16px 0 16px 24px; padding: 0; }
        .rich-text li { margin-bottom: 12px; padding-left: 4px; }
        .rich-text li::marker { color: var(--text-muted); font-weight: 600; }
        
        .rich-text strong { font-weight: 700; color: var(--text-main); }
        
        .rich-text blockquote {
            border-left: 3px solid var(--color-blue);
            background: rgba(37, 99, 235, 0.04);
            padding: 16px 20px; margin: 20px 0;
            font-style: italic; border-radius: 0 8px 8px 0;
            color: var(--text-muted);
        }

        /* Акценты для блоков */
        .card-danger { border-left: 4px solid var(--color-red); }
        .card-action { border-left: 4px solid var(--color-green); }

        /* Графики */
        .metric-item { margin-bottom: 24px; }
        .metric-item:last-child { margin-bottom: 0; }
        .metric-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
        .metric-label { font-size: 14px; font-weight: 600; max-width: 80%; line-height: 1.3; }
        .metric-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 20px; }
        .metric-track { height: 6px; background: #e5e5e5; border-radius: 3px; overflow: hidden; }
        .metric-fill { height: 100%; border-radius: 3px; width: 0; transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1); }
        .metric-fill.pulsing { animation: pulseGlow 2s infinite alternate; }
        
        @keyframes pulseGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.2); }
        }

        /* Технические бейджи */
        .tech-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tech-tag {
            background: #fff; border: 1px solid var(--border-color);
            padding: 6px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 500; color: var(--text-muted);
            transition: all 0.2s ease;
        }
        .tech-tag:hover { background: #f0f0f0; color: var(--text-main); }

    </style>
</head>
<body>

<div class="container">
    <!-- VIEW: AUTH -->
    <div id="auth-view">
        <div class="login-orb orb-1"></div>
        <div class="login-orb orb-2"></div>
        <div class="glass-panel">
            <div class="auth-logo">AM</div>
            <h1 class="auth-title">Analytic Matrix</h1>
            <p class="auth-subtitle">Персональный профиль сотрудника</p>
            <input type="text" id="token-input" class="input-token" placeholder="Введите ваш токен" autocomplete="off" spellcheck="false">
            <button class="btn-submit" id="btn-unlock">Открыть профиль</button>
            <div id="error-msg" class="error-message"></div>
        </div>
    </div>

    <!-- VIEW: PROFILE -->
    <div id="profile-view">
        <div class="nav-bar">
            <button class="btn-back" id="btn-lock">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Выйти
            </button>
        </div>

        <div class="hero-section">
            <div class="profile-name" id="ui-name">Загрузка...</div>
            <div class="profile-role" id="ui-role">...</div>
        </div>

        <div class="grid-layout">
            <div class="content-card">
                <div class="card-title"><div class="indicator ind-blue"></div>Рабочая модель</div>
                <div class="rich-text" id="ui-portrait"></div>
            </div>

            <div class="content-card">
                <div class="card-title"><div class="indicator ind-orange"></div>Карта натяжения</div>
                <div id="ui-metrics"></div>
            </div>
        </div>

        <div class="content-card card-danger" style="margin-bottom: 24px;">
            <div class="card-title" style="color: var(--color-red)"><div class="indicator ind-red"></div>Зона напряжения</div>
            <div class="rich-text" id="ui-tension"></div>
        </div>

        <div class="content-card card-action" id="card-experiment" style="margin-bottom: 24px; display: none;">
            <div class="card-title" style="color: var(--color-green)"><div class="indicator ind-green"></div>Рекомендованный эксперимент</div>
            <div class="rich-text" id="ui-experiment"></div>
        </div>

        <div class="content-card">
            <div class="card-title"><div class="indicator ind-gray"></div>Технические параметры</div>
            <div class="tech-tags" id="ui-tech"></div>
        </div>
    </div>
</div>

<script>
/**
 * СИСТЕМНОЕ ЯДРО
 * Разделено на DataLayer, ParserLayer и UILayer для enterprise-качества.
 */

class DataLayer {
    constructor() {
        this.database = null;
        this.techInfo = null;
        this.normalizedTechInfo = {};
    }

    async init() {
        try {
            const [dbRes, techRes] = await Promise.all([
                fetch('database.json').catch(() => null),
                fetch('tech_info.json').catch(() => null)
            ]);
            
            if (dbRes && dbRes.ok) this.database = await dbRes.json();
            if (techRes && techRes.ok) {
                this.techInfo = await techRes.json();
                this._buildNormalizedTechIndex();
            }
        } catch (e) {
            console.error("DataLayer init error:", e);
        }
    }

    _normalizeString(str) {
        // Очистка от пробелов, дефисов, цифр. Перевод в нижний регистр.
        // "Гостев Сергей т170" -> "гостевсергей"
        return str.toLowerCase().replace(/[^а-яёa-z]/gi, '');
    }

    _buildNormalizedTechIndex() {
        for (const key in this.techInfo) {
            this.normalizedTechInfo[this._normalizeString(key)] = this.techInfo[key];
        }
    }

    getEncryptedProfile(tokenName) {
        if (!this.database) return null;
        const normTarget = this._normalizeString(tokenName);
        
        // Сначала точное совпадение
        if (this.database[tokenName]) return this.database[tokenName];
        
        // Нечеткое совпадение
        for (const key in this.database) {
            if (this._normalizeString(key) === normTarget) return this.database[key];
        }
        return null;
    }

    getTechInfo(tokenName) {
        const normTarget = this._normalizeString(tokenName);
        return this.normalizedTechInfo[normTarget] || null;
    }

    decrypt(encryptedBase64, fullToken) {
        try {
            const tokenBytes = CryptoJS.enc.Utf8.parse(fullToken);
            const key = CryptoJS.SHA256(tokenBytes);
            const iv = CryptoJS.MD5(tokenBytes);
            
            const decrypted = CryptoJS.AES.decrypt(encryptedBase64, key, {
                iv: iv,
                mode: CryptoJS.mode.CBC,
                padding: CryptoJS.pad.Pkcs7
            });
            
            const text = decrypted.toString(CryptoJS.enc.Utf8);
            if (!text) throw new Error("Decryption yielded empty string");
            return text;
        } catch (e) {
            return null;
        }
    }
}

class ParserLayer {
    
    // Экранирование HTML тегов
    static escapeHtml(unsafe) {
        return safeString = unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }

    // Парсинг базового Markdown (bold)
    static parseMarkdown(text) {
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    }

    /**
     * СИСТЕМНЫЙ УМНЫЙ ФОРМАТЕР ТЕКСТА
     * Решает проблему "разорванных" строк и слипшихся списков.
     */
    static formatRichText(rawText) {
        if (!rawText || rawText.trim().length === 0) return '<p>Нет данных</p>';

        const lines = rawText.split('\n');
        const processedLines = [];
        
        // ШАГ 1: Un-wrap (Склейка искусственно разорванных строк)
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line === '') {
                processedLines.push('');
                continue;
            }

            // Проверяем, является ли строка концом абзаца/мысли
            // Заканчивается на пунктуацию ИЛИ следующая строка пустая ИЛИ следующая строка начинается со списка
            const endsWithPunctuation = /[.!?:]$/.test(line);
            const isNextLineEmpty = (i + 1 >= lines.length) || (lines[i + 1].trim() === '');
            const isNextLineList = (i + 1 < lines.length) && /^[-•\d]/.test(lines[i + 1].trim());

            if (!endsWithPunctuation && !isNextLineEmpty && !isNextLineList) {
                // Если строка разорвана, присоединяем следующую
                lines[i+1] = line + ' ' + lines[i+1].trim();
            } else {
                processedLines.push(line);
            }
        }

        // ШАГ 2: Рендер в HTML (Стейт-машина)
        let html = '';
        let inUl = false;
        let inOl = false;

        for (let line of processedLines) {
            if (!line) {
                // Пустая строка закрывает списки
                if (inUl) { html += '</ul>'; inUl = false; }
                if (inOl) { html += '</ol>'; inOl = false; }
                continue;
            }

            line = this.parseMarkdown(this.escapeHtml(line));

            const ulMatch = line.match(/^[-•]\s+(.*)/);
            const olMatch = line.match(/^(\d+)[\.\)]\s+(.*)/);

            if (ulMatch) {
                if (inOl) { html += '</ol>'; inOl = false; }
                if (!inUl) { html += '<ul>'; inUl = true; }
                html += `<li>${ulMatch[1]}</li>`;
            } 
            else if (olMatch) {
                if (inUl) { html += '</ul>'; inUl = false; }
                if (!inOl) { html += '<ol>'; inOl = true; }
                html += `<li>${olMatch[2]}</li>`;
            } 
            else {
                if (inUl) { html += '</ul>'; inUl = false; }
                if (inOl) { html += '</ol>'; inOl = false; }
                html += `<p>${line}</p>`;
            }
        }

        if (inUl) html += '</ul>';
        if (inOl) html += '</ol>';

        return html;
    }

    /**
     * ЖЕСТКИЙ ЭКСТРАКТОР МЕТРИК
     * Защита от мусора и комментариев LLM.
     */
    static extractMetrics(text) {
        const metrics = [];
        const lines = text.split('\n');
        let currentLabel = '';

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            // Если парсер дошел до блока "Как читать эту карту" - немедленный стоп.
            if (line.toUpperCase().includes('КАК ЧИТАТЬ') || line.includes('Первая полоска')) {
                break;
            }

            // Ищем строку с прогресс-баром LLM
            if (/[█░]/.test(line) && line.includes('%')) {
                const percentMatch = line.match(/(\d{1,3})\s*%/);
                if (percentMatch && currentLabel) {
                    const value = parseInt(percentMatch[1], 10);
                    // Валидация: 0-100%, метка адекватной длины, не является служебной строкой
                    if (value >= 0 && value <= 100 && currentLabel.length < 100 && !/колонк|строк/i.test(currentLabel)) {
                        metrics.push({ label: currentLabel, value: value });
                    }
                    currentLabel = ''; // сброс
                }
            } else {
                // Если строка не заголовок ===, запоминаем ее как потенциальное имя следующей метрики
                if (!line.startsWith('===')) {
                    currentLabel = line.replace(/[:\-]+$/, '').trim(); // Убираем висящие двоеточия
                }
            }

            // Защита: нам нужно максимум 4 показателя карты натяжения
            if (metrics.length === 4) break;
        }

        return metrics;
    }

    /**
     * СЕГМЕНТАТОР ОТЧЕТА
     */
    static parseDocument(rawText) {
        const doc = { name: '', role: '', portrait: [], tension: [], metricsRaw: '', experiment: [] };
        const lines = rawText.replace(/\r/g, '').split('\n');
        
        let currentSection = 'portrait';

        for (let line of lines) {
            const trimmed = line.trim();
            const upper = trimmed.toUpperCase();

            // Извлекаем шапку
            if (upper.startsWith('ПРОФИЛЬ:')) { doc.name = trimmed.substring(8).trim(); continue; }
            if (upper.startsWith('ДОЛЖНОСТЬ:')) { doc.role = trimmed.substring(10).trim(); continue; }
            
            if (/^={5,}$/.test(trimmed)) continue; // Пропускаем ===

            // Определяем смену секций по ключевым фразам в заголовках
            if (upper.includes('ВАШ ПОРТРЕТ')) { currentSection = 'portrait'; continue; }
            if (upper.includes('ЧТО ЗАБИРАЕТ ВАШУ ЭНЕРГИЮ') || upper.includes('ГИПОТЕЗА')) { currentSection = 'tension'; continue; }
            if (upper.includes('КАРТА НАПРЯЖЕНИЯ')) { currentSection = 'metricsRaw'; continue; }
            if (upper.includes('КАК ЭТО МОЖЕТ ВЫГЛЯДЕТЬ')) { currentSection = 'tension'; continue; } // Сливаем гипотезу и пример
            if (upper.includes('ЧТО МОЖНО ПОПРОБОВАТЬ') || upper.includes('ЭКСПЕРИМЕНТ')) { currentSection = 'experiment'; continue; }

            // Наполняем секции
            if (currentSection === 'metricsRaw') {
                doc.metricsRaw += line + '\n';
            } else if (currentSection && doc[currentSection] !== undefined) {
                doc[currentSection].push(line);
            }
        }

        return {
            name: doc.name,
            role: doc.role,
            htmlPortrait: this.formatRichText(doc.portrait.join('\n')),
            htmlTension: this.formatRichText(doc.tension.join('\n')),
            htmlExperiment: this.formatRichText(doc.experiment.join('\n')),
            metrics: this.extractMetrics(doc.metricsRaw)
        };
    }
}

class UILayer {
    constructor() {
        this.views = {
            auth: document.getElementById('auth-view'),
            profile: document.getElementById('profile-view')
        };
        this.errorEl = document.getElementById('error-msg');
        this.animations = [];
    }

    showError(msg) {
        this.errorEl.textContent = msg;
        this.errorEl.style.display = 'block';
    }

    hideError() {
        this.errorEl.style.display = 'none';
    }

    showProfile() {
        this.views.auth.style.display = 'none';
        this.views.profile.style.display = 'block';
        
        // Запуск анимаций карточек
        const cards = document.querySelectorAll('.content-card');
        cards.forEach((card, index) => {
            setTimeout(() => card.classList.add('visible'), 100 + (index * 150));
        });
    }

    showAuth() {
        this.views.profile.style.display = 'none';
        this.views.auth.style.display = 'block';
        document.getElementById('token-input').value = '';
        const cards = document.querySelectorAll('.content-card');
        cards.forEach(card => card.classList.remove('visible'));
    }

    render(parsedDoc, techInfo) {
        // Шапка
        document.getElementById('ui-name').textContent = parsedDoc.name || 'Сотрудник';
        document.getElementById('ui-role').textContent = parsedDoc.role || 'Должность не указана';

        // Текстовые блоки
        document.getElementById('ui-portrait').innerHTML = parsedDoc.htmlPortrait;
        document.getElementById('ui-tension').innerHTML = parsedDoc.htmlTension;
        
        const expEl = document.getElementById('card-experiment');
        if (parsedDoc.htmlExperiment.length > 50) {
            document.getElementById('ui-experiment').innerHTML = parsedDoc.htmlExperiment;
            expEl.style.display = 'block';
        } else {
            expEl.style.display = 'none';
        }

        // Метрики
        this.renderMetrics(parsedDoc.metrics);

        // Техническая информация
        this.renderTech(techInfo);
    }

    renderMetrics(metrics) {
        const container = document.getElementById('ui-metrics');
        if (!metrics || metrics.length === 0) {
            container.innerHTML = '<p class="text-muted">Метрики не сформированы</p>';
            return;
        }

        let html = '';
        this.animations = [];

        metrics.forEach((m, i) => {
            let color, shadow;
            if (m.value >= 80) { color = 'var(--color-red)'; shadow = 'var(--accent-red-glow)'; }
            else if (m.value >= 50) { color = 'var(--color-orange)'; shadow = 'var(--accent-amber-glow)'; }
            else if (m.value >= 20) { color = 'var(--color-blue)'; shadow = 'var(--accent-blue-glow)'; }
            else { color = 'var(--color-green)'; shadow = 'var(--accent-emerald-glow)'; }

            html += `
                <div class="metric-item">
                    <div class="metric-header">
                        <div class="metric-label">${ParserLayer.escapeHtml(m.label)}</div>
                        <div class="metric-value" style="color:${color}">${m.value}%</div>
                    </div>
                    <div class="metric-track">
                        <div class="metric-fill pulsing" id="bar-${i}" style="background-color:${color}; box-shadow: 0 0 10px ${shadow}"></div>
                    </div>
                </div>`;
            this.animations.push({ id: `bar-${i}`, width: m.value });
        });

        container.innerHTML = html;

        // Запускаем анимацию прогресс-баров с задержкой
        setTimeout(() => {
            this.animations.forEach(anim => {
                const el = document.getElementById(anim.id);
                if (el) el.style.width = anim.width + '%';
            });
        }, 500);
    }

    renderTech(info) {
        const container = document.getElementById('ui-tech');
        if (!info) {
            container.innerHTML = '<span class="tech-tag">Данные не найдены</span>';
            return;
        }

        const tags = [];
        if (info.status) tags.push(`Статус: ${info.status}`);
        if (info.medianTime) tags.push(`Время: ${info.medianTime}`);
        if (info.blurCount !== undefined) tags.push(`Смена вкладок: ${info.blurCount}`);
        if (info.flatlining) tags.push(`Паттерн: Flatlining`);
        if (info.discProfile) tags.push(`DISC: ${info.discProfile}`);
        if (info.dominantScales) {
            info.dominantScales.forEach(s => tags.push(s));
        }

        container.innerHTML = tags.map(t => `<span class="tech-tag">${ParserLayer.escapeHtml(t)}</span>`).join('');
    }
}

// Инициализация приложения
const data = new DataLayer();
const ui = new UILayer();

window.addEventListener('DOMContentLoaded', async () => {
    await data.init();
    
    // Авто-логин
    const savedToken = sessionStorage.getItem('am_token');
    if (savedToken) {
        document.getElementById('token-input').value = savedToken;
        processLogin();
    }
});

document.getElementById('btn-unlock').addEventListener('click', processLogin);
document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') processLogin();
});
document.getElementById('btn-lock').addEventListener('click', () => {
    sessionStorage.removeItem('am_token');
    ui.showAuth();
});

function processLogin() {
    ui.hideError();
    const token = document.getElementById('token-input').value.trim();
    
    if (!data.database) { ui.showError("База данных недоступна"); return; }
    if (!token) { ui.showError("Введите токен"); return; }

    const dashIdx = token.lastIndexOf('-');
    if (dashIdx === -1) { ui.showError("Неверный формат токена"); return; }

    const employeeName = token.substring(0, dashIdx).trim();
    const encrypted = data.getEncryptedProfile(employeeName);

    if (!encrypted) { ui.showError("Сотрудник не найден"); return; }

    const decrypted = data.decrypt(encrypted, token);
    if (!decrypted || !decrypted.includes('ПРОФИЛЬ:')) { 
        ui.showError("Недействительный токен-ключ"); 
        return; 
    }

    sessionStorage.setItem('am_token', token);
    
    const parsed = ParserLayer.parseDocument(decrypted);
    const techInfo = data.getTechInfo(employeeName);
    
    ui.render(parsed, techInfo);
    ui.showProfile();
}
</script>
