<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytic Matrix | Персональный профиль</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #fafaf8;
            --bg-glass: rgba(255, 255, 255, 0.65);
            --border-subtle: rgba(0, 0, 0, 0.05);
            --border-medium: rgba(0, 0, 0, 0.08);
            --text-primary: #131313;
            --text-secondary: #555555;
            --text-tertiary: #8a8a8a;
            --accent-blue: #1d4ed8;
            --accent-blue-glow: rgba(29, 78, 216, 0.18);
            --accent-red: #dc2626;
            --accent-red-glow: rgba(220, 38, 38, 0.15);
            --accent-amber: #d97706;
            --accent-amber-glow: rgba(217, 119, 6, 0.15);
            --accent-emerald: #059669;
            --accent-emerald-glow: rgba(5, 150, 105, 0.15);
            --accent-violet: #6d28d9;
            --accent-violet-glow: rgba(109, 40, 217, 0.12);
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.07);
            --shadow-glow-blue: 0 0 24px var(--accent-blue-glow);
            --radius-xs: 6px; --radius-sm: 10px; --radius-md: 16px;
            --radius-lg: 22px; --radius-xl: 28px;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width: 1000px; width: 100%; margin-top: 20px; }

        #login-screen {
            margin-top: 14vh; text-align: center; max-width: 440px;
            margin-left: auto; margin-right: auto; position: relative;
        }
        .login-orb {
            position: absolute; border-radius: 50%; pointer-events: none; z-index: 0;
            animation: orbFloat 12s ease-in-out infinite;
        }
        .login-orb.orb-1 {
            width: 200px; height: 200px; top: -80px; left: -60px;
            background: radial-gradient(circle, var(--accent-blue-glow) 0%, transparent 70%);
        }
        .login-orb.orb-2 {
            width: 260px; height: 260px; bottom: -120px; right: -90px;
            background: radial-gradient(circle, var(--accent-violet-glow) 0%, transparent 70%);
            animation-delay: -5s;
        }
        .login-orb.orb-3 {
            width: 140px; height: 140px; top: 50%; left: 60%;
            background: radial-gradient(circle, var(--accent-emerald-glow) 0%, transparent 70%);
            animation-delay: -3s; animation-duration: 9s;
        }
        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -20px) scale(1.08); }
            50% { transform: translate(-10px, -40px) scale(0.95); }
            75% { transform: translate(-25px, 10px) scale(1.04); }
        }

        .login-card {
            position: relative; z-index: 1;
            background: var(--bg-glass); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 44px; border-radius: var(--radius-xl);
            border: 1px solid var(--border-subtle); box-shadow: var(--shadow-lg);
        }
        .login-icon {
            width: 52px; height: 52px; margin: 0 auto 18px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-violet) 100%);
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; color: #fff;
            box-shadow: var(--shadow-glow-blue);
        }
        .login-title { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; color: var(--text-primary); margin-bottom: 4px; }
        .login-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; font-weight: 400; }

        .token-input {
            width: 100%; padding: 14px 18px; background: #f4f3f0;
            border: 1px solid var(--border-medium); border-radius: var(--radius-sm);
            font-family: 'JetBrains Mono', monospace; font-size: 13px;
            text-align: center; color: var(--text-primary); outline: none;
            transition: all 0.3s var(--ease-out-expo);
        }
        .token-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 5px var(--accent-blue-glow); background: #fff; }

        .btn-unlock {
            width: 100%; padding: 14px; margin-top: 18px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, #1e40af 100%);
            color: #fff; border: none; font-size: 14px; font-weight: 600;
            cursor: pointer; border-radius: var(--radius-sm); letter-spacing: 0.6px;
            transition: all 0.3s var(--ease-out-expo);
            box-shadow: 0 8px 24px var(--accent-blue-glow);
            position: relative; overflow: hidden;
        }
        .btn-unlock:hover { transform: translateY(-1px); box-shadow: 0 12px 32px rgba(29, 78, 216, 0.3); }
        .btn-unlock:active { transform: translateY(0); }
        .btn-unlock::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.18) 50%, transparent 60%);
            animation: shimmer 2.5s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .error-msg {
            color: var(--accent-red); margin-top: 14px; display: none;
            font-size: 12px; font-weight: 500;
            background: rgba(220,38,38,0.04); padding: 10px 14px;
            border-radius: var(--radius-xs); border: 1px solid rgba(220,38,38,0.12);
        }
        .error-msg.visible { display: block; }

        #profile-screen { display: none; animation: dashboardReveal 0.8s var(--ease-out-expo); }
        @keyframes dashboardReveal {
            from { opacity: 0; transform: translateY(50px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .btn-exit {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--bg-glass); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle); color: var(--text-secondary);
            padding: 10px 18px; border-radius: 25px; font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.3s var(--ease-out-expo);
            box-shadow: var(--shadow-xs); text-decoration: none;
        }
        .btn-exit:hover { background: #fff; color: var(--text-primary); box-shadow: var(--shadow-sm); transform: translateX(-3px); }

        .hero-card {
            background: var(--bg-glass); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-xl); padding: 36px 40px; margin-bottom: 24px;
            border: 1px solid var(--border-subtle); box-shadow: var(--shadow-md);
            position: relative; overflow: hidden;
        }
        .hero-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-violet), var(--accent-emerald), var(--accent-amber), var(--accent-blue));
            background-size: 200% 100%;
            animation: gradientFlow 6s linear infinite;
            border-radius: 3px 3px 0 0;
        }
        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .hero-name { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-primary); }
        .hero-role { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent-blue); margin-top: 4px; }

        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        @media (max-width: 800px) { .grid-2col { grid-template-columns: 1fr; } }

        .card {
            background: var(--bg-glass); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg); padding: 30px;
            border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);
            transition: all 0.4s var(--ease-out-expo);
            position: relative; opacity: 0; transform: translateY(30px);
        }
        .card.revealed { opacity: 1; transform: translateY(0); }
        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-3px); }

        .card-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 18px; padding-bottom: 14px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .card-dot.dot-blue { background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue-glow); }
        .card-dot.dot-amber { background: var(--accent-amber); box-shadow: 0 0 8px var(--accent-amber-glow); }
        .card-dot.dot-red { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red-glow); }
        .card-dot.dot-emerald { background: var(--accent-emerald); box-shadow: 0 0 8px var(--accent-emerald-glow); }
        .card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.8px; color: var(--text-tertiary); }

        .card-risk { border-left: 3px solid var(--accent-red); background: linear-gradient(135deg, rgba(220,38,38,0.02) 0%, var(--bg-glass) 40%); margin-bottom: 24px; }
        .card-protocol { border-left: 3px solid var(--accent-emerald); background: linear-gradient(135deg, rgba(5,150,105,0.02) 0%, var(--bg-glass) 40%); margin-bottom: 24px; }

        .text-block { font-size: 14px; line-height: 1.75; color: var(--text-primary); max-width: 680px; }
        .text-block p { margin-bottom: 14px; }
        .text-block ul, .text-block ol { margin: 10px 0 16px 0; padding-left: 22px; }
        .text-block li { margin-bottom: 7px; line-height: 1.65; font-size: 14px; }
        .text-block strong { color: var(--accent-blue); font-weight: 700; }

        .text-quote {
            background: linear-gradient(135deg, rgba(109,40,217,0.03), rgba(29,78,216,0.02));
            border-left: 3px solid var(--accent-violet);
            padding: 16px 20px; font-size: 14px; line-height: 1.7;
            font-style: italic; color: var(--text-primary);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
            margin: 16px 0; max-width: 680px;
        }

        .metric-row { margin-bottom: 18px; }
        .metric-row:last-child { margin-bottom: 0; }
        .metric-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
        .metric-name { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
        .metric-pct { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; font-family: 'JetBrains Mono', monospace; }
        .metric-bar { height: 10px; background: #e8e5df; border-radius: 5px; overflow: hidden; }
        .metric-fill { height: 100%; border-radius: 5px; width: 0; transition: width 2s var(--ease-out-expo); }
        .metric-fill.animated { animation: barGlow 3s ease-in-out infinite; }
        @keyframes barGlow { 0%, 100% { filter: brightness(1) saturate(1); } 50% { filter: brightness(1.3) saturate(1.2); } }

        .badge-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
        .badge {
            background: #f0efed; padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: 500; color: var(--text-secondary);
            border: 1px solid var(--border-medium);
            transition: all 0.25s var(--ease-out-expo);
        }
        .badge:hover { background: #fff; border-color: #ccc; color: var(--text-primary); box-shadow: var(--shadow-xs); }

        @media (max-width: 600px) {
            .hero-card { padding: 24px 20px; }
            .hero-name { font-size: 22px; }
            .card { padding: 20px; }
            .login-card { padding: 36px 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="login-orb orb-1"></div>
        <div class="login-orb orb-2"></div>
        <div class="login-orb orb-3"></div>
        <div class="login-card">
            <div class="login-icon">AM</div>
            <div class="login-title">Analytic Matrix</div>
            <div class="login-subtitle">Персональный профиль сотрудника</div>
            <input type="text" class="token-input" id="token-input" placeholder="Иванов Иван-aB3xKq9" autocomplete="off">
            <button class="btn-unlock" onclick="unlock()">Расшифровать</button>
            <div class="error-msg" id="error-msg"></div>
        </div>
    </div>

    <div id="profile-screen">
        <div class="top-bar">
            <button class="btn-exit" onclick="lock()">← Выйти</button>
        </div>
        <div class="hero-card">
            <div class="hero-name" id="h-name">—</div>
            <div class="hero-role" id="h-role">—</div>
        </div>
        <div class="grid-2col">
            <div class="card" data-reveal>
                <div class="card-header"><div class="card-dot dot-blue"></div><div class="card-label">Рабочая модель</div></div>
                <div id="block-act1"></div>
            </div>
            <div class="card" data-reveal>
                <div class="card-header"><div class="card-dot dot-amber"></div><div class="card-label">Карта натяжения</div></div>
                <div id="block-metrics"></div>
            </div>
        </div>
        <div class="card card-risk" data-reveal>
            <div class="card-header"><div class="card-dot dot-red"></div><div class="card-label" style="color:var(--accent-red);">Зона напряжения</div></div>
            <div id="block-act2"></div>
        </div>
        <div class="card card-protocol" data-reveal id="wrap-act3">
            <div class="card-header"><div class="card-dot dot-emerald"></div><div class="card-label" style="color:var(--accent-emerald);">Эксперимент</div></div>
            <div id="block-act3"></div>
        </div>
        <div class="card" data-reveal>
            <div class="card-header"><div class="card-dot" style="background:#8a8a8a;"></div><div class="card-label">Технические параметры</div></div>
            <div class="badge-wrap" id="block-tech"></div>
        </div>
    </div>
</div>

<script>
    let DB = null;
    let TECH = null;
    let metricQueue = [];

    window.addEventListener('load', async () => {
        // Загружаем базу профилей
        try {
            const r = await fetch('database.json');
            if (!r.ok) throw new Error();
            DB = await r.json();
        } catch (_) {
            document.getElementById('error-msg').textContent = 'База данных недоступна.';
            document.getElementById('error-msg').classList.add('visible');
        }
        
        // Загружаем техническую информацию
        try {
            const r2 = await fetch('tech_info.json');
            if (r2.ok) TECH = await r2.json();
        } catch (_) {
            TECH = {};
        }
        
        const saved = sessionStorage.getItem('am_token_final');
        if (saved && DB) { document.getElementById('token-input').value = saved; unlock(); }
    });

    document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

    function showErr(m) { const el = document.getElementById('error-msg'); el.textContent = m; el.classList.add('visible'); }
    function hideErr() { document.getElementById('error-msg').classList.remove('visible'); }

    function unlock() {
        hideErr();
        const token = document.getElementById('token-input').value.trim();
        if (!DB) { showErr('База загружается.'); return; }
        if (!token) { showErr('Введите токен.'); return; }
        const lastDash = token.lastIndexOf('-');
        if (lastDash === -1) { showErr('Формат токена неверен.'); return; }
        const uid = token.substring(0, lastDash);
        const enc = DB[uid] || DB[uid.replace(/_/g,' ')] || DB[uid.replace(/ /g,'_')];
        if (!enc) { showErr('Сотрудник не найден.'); return; }

        let raw;
        try {
            const tb = CryptoJS.enc.Utf8.parse(token);
            const k = CryptoJS.SHA256(tb); const iv = CryptoJS.MD5(tb);
            const d = CryptoJS.AES.decrypt(enc, k, { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
            raw = d.toString(CryptoJS.enc.Utf8);
            if (!raw || !raw.includes('ПРОФИЛЬ:')) throw new Error();
        } catch (_) { showErr('Ключ недействителен.'); return; }

        sessionStorage.setItem('am_token_final', token);
        render(raw);
    }

    function lock() {
        sessionStorage.removeItem('am_token_final');
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('token-input').value = '';
        hideErr();
        metricQueue = [];
    }

    function parseDoc(raw) {
        const clean = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        const result = { name: '', role: '', act1: '', act2: '', act3: '', metrics: [] };
        const sections = { 'portrait': [], 'energy': [], 'metrics': [], 'example': [], 'experiment': [] };
        let currentKey = null;
        const lines = clean.split('\n');
        
        for (const line of lines) {
            const trimmed = line.trim();
            if (line.startsWith('ПРОФИЛЬ:')) result.name = line.replace('ПРОФИЛЬ:', '').trim();
            else if (line.startsWith('ДОЛЖНОСТЬ:')) result.role = line.replace('ДОЛЖНОСТЬ:', '').trim();
            else if (trimmed.includes('ВАШ ПОРТРЕТ')) currentKey = 'portrait';
            else if (trimmed.includes('ЭНЕРГИЮ') || trimmed.includes('ГИПОТЕЗА')) currentKey = 'energy';
            else if (trimmed.includes('КАРТА НАПРЯЖЕНИЯ')) currentKey = 'metrics';
            else if (trimmed.includes('ВЫГЛЯДЕТЬ')) currentKey = 'example';
            else if (trimmed.includes('Эксперимент') || trimmed.includes('ПОПРОБОВАТЬ')) currentKey = 'experiment';
            else if (trimmed.startsWith('===') || trimmed.startsWith('---')) continue;
            else if (currentKey) sections[currentKey].push(line);
        }

        result.act1 = sections['portrait'].join('\n').trim();
        result.act2 = (sections['energy'].join('\n') + '\n\n' + sections['example'].join('\n')).trim();
        result.act3 = sections['experiment'].join('\n').trim();
        result.metrics = parseMetrics(sections['metrics'].join('\n'));
        return result;
    }

    function parseMetrics(text) {
        const metrics = [];
        if (!text) return metrics;
        const lines = text.split('\n');
        for (let i = 0; i < lines.length; i++) {
            const trimmed = lines[i].trim();
            if (!trimmed) continue;
            const pctMatch = trimmed.match(/(\d+)\s*%/);
            if (pctMatch) {
                const val = parseInt(pctMatch[1]);
                if (val <= 0 || val > 100) continue;
                let label = '';
                const labelMatch = trimmed.match(/^(.+?):\s*[█░]*\s*\d+\s*%/);
                if (labelMatch) {
                    label = labelMatch[1].trim();
                } else {
                    for (let j = i - 1; j >= 0; j--) {
                        const prev = lines[j].trim();
                        if (prev.endsWith(':')) { label = prev.replace(/:$/, '').trim(); break; }
                        if (prev.length === 0) break;
                    }
                }
                if (label) metrics.push({ label, value: val });
            }
        }
        return metrics;
    }

    function render(raw) {
        const doc = parseDoc(raw);
        document.getElementById('h-name').textContent = doc.name || '—';
        document.getElementById('h-role').textContent = doc.role || '—';

        // Технические параметры из tech_info.json
        if (TECH && TECH[doc.name]) {
            const info = TECH[doc.name];
            const badges = [];
            badges.push(`Статус: ${info.status}`);
            badges.push(`Время ответа: ${info.medianTime}`);
            if (info.blurCount > 0) badges.push(`Переключений вкладок: ${info.blurCount}`);
            if (info.flatlining) badges.push(`Паттерн: flatlining`);
            if (info.dominantScales && info.dominantScales.length) badges.push(...info.dominantScales);
            if (info.discProfile) badges.push(`DISC: ${info.discProfile}`);
            document.getElementById('block-tech').innerHTML = badges.map(t => `<span class="badge">${t}</span>`).join('');
        } else {
            document.getElementById('block-tech').innerHTML = '<span class="badge">Технические данные отсутствуют</span>';
        }

        document.getElementById('block-act1').innerHTML = smartFormat(doc.act1);
        document.getElementById('block-act2').innerHTML = smartFormat(doc.act2);
        
        if (doc.act3 && doc.act3.length > 20) {
            document.getElementById('block-act3').innerHTML = smartFormat(doc.act3);
            document.getElementById('wrap-act3').style.display = 'block';
        } else {
            document.getElementById('wrap-act3').style.display = 'none';
        }

        renderMetrics(doc.metrics);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('profile-screen').style.display = 'block';

        requestAnimationFrame(() => {
            document.querySelectorAll('[data-reveal]').forEach((card, i) => {
                setTimeout(() => card.classList.add('revealed'), i * 120);
            });
        });
        setTimeout(animateMetrics, 400);
    }

    function smartFormat(text) {
        if (!text || text.length < 5) return '<div class="text-block"><p style="color:var(--text-tertiary);">Нет данных</p></div>';
        const rawParagraphs = text.split(/\n\s*\n/);
        let html = '';
        for (const rawPara of rawParagraphs) {
            const lines = rawPara.split('\n').map(l => l.trim()).filter(l => l);
            if (lines.length === 0) continue;
            const isQuote = lines.length === 1 && (lines[0].startsWith('«') || lines[0].startsWith('"'));
            if (isQuote) {
                let escaped = lines[0].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                html += `<div class="text-quote">${escaped}</div>`;
                continue;
            }
            const isOrderedList = lines.length >= 2 && lines.every(l => /^\d+[\.\)]\s/.test(l));
            if (isOrderedList) {
                html += '<ol>';
                for (const line of lines) {
                    let escaped = line.replace(/^\d+[\.\)]\s*/, '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    html += `<li>${escaped}</li>`;
                }
                html += '</ol>';
                continue;
            }
            const isUnorderedList = lines.length >= 2 && lines.every(l => /^[•\-\–]\s/.test(l));
            if (isUnorderedList) {
                html += '<ul>';
                for (const line of lines) {
                    let escaped = line.replace(/^[•\-\–]\s*/, '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                    html += `<li>${escaped}</li>`;
                }
                html += '</ul>';
                continue;
            }
            const singleLine = lines.join(' ');
            let escaped = singleLine.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html += `<p>${escaped}</p>`;
        }
        return `<div class="text-block">${html}</div>`;
    }

    function renderMetrics(metrics) {
        if (!metrics || !metrics.length) {
            document.getElementById('block-metrics').innerHTML = '<div class="text-block"><p style="color:var(--text-tertiary);">Метрики не обнаружены</p></div>';
            return;
        }
        let html = '';
        metrics.forEach((m, i) => {
            let color, glow;
            if (m.value >= 80) { color = '#dc2626'; glow = 'rgba(220,38,38,0.5)'; }
            else if (m.value >= 50) { color = '#d97706'; glow = 'rgba(217,119,6,0.45)'; }
            else if (m.value <= 20) { color = '#059669'; glow = 'rgba(5,150,105,0.4)'; }
            else { color = '#2563eb'; glow = 'rgba(37,99,235,0.4)'; }
            html += `<div class="metric-row"><div class="metric-top"><span class="metric-name">${m.label}</span><span class="metric-pct" style="color:${color};">${m.value}%</span></div><div class="metric-bar"><div class="metric-fill animated" id="m-${i}" style="background:${color};box-shadow:0 0 14px ${glow};"></div></div></div>`;
            metricQueue.push({ id: `m-${i}`, width: m.value });
        });
        document.getElementById('block-metrics').innerHTML = html;
    }

    function animateMetrics() {
        metricQueue.forEach(item => {
            const el = document.getElementById(item.id);
            if (el) el.style.width = item.width + '%';
        });
        metricQueue = [];
    }
</script>
</body>
</html>
