<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Audit System — Персональный профиль</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        :root {
            --bg: #f5f3f0;
            --card-bg: #ffffff;
            --text: #2c2c2c;
            --text-secondary: #6b6b6b;
            --border: #e0dcd5;
            --accent: #2c3e50;
            --accent-light: #3e5871;
            --bar-full: #2c3e50;
            --bar-empty: #e8e4de;
            --shadow: 0 2px 16px rgba(0,0,0,0.06);
            --radius: 10px;
            --font: 'Georgia', 'Times New Roman', serif;
            --font-mono: 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Экран входа */
        .login-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 60px 50px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            margin-top: 80px;
        }

        .login-container .logo {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .login-container h1 {
            font-size: 26px;
            font-weight: normal;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .login-container .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 36px;
        }

        .login-container input {
            width: 100%;
            padding: 16px 20px;
            font-size: 15px;
            font-family: var(--font-mono);
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
            letter-spacing: 1px;
            outline: none;
            transition: border-color 0.3s;
            background: #fafaf9;
        }

        .login-container input:focus {
            border-color: var(--accent);
        }

        .login-container button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            font-size: 15px;
            font-family: var(--font);
            letter-spacing: 2px;
            text-transform: uppercase;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-container button:hover {
            background: var(--accent-light);
        }

        .error-message {
            color: #b7473b;
            font-size: 14px;
            margin-top: 16px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        /* Экран профиля */
        .profile-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            max-width: 820px;
            width: 100%;
            padding: 60px 65px;
            display: none;
        }

        .profile-container .header-line {
            width: 50px;
            height: 2px;
            background: var(--accent);
            margin-bottom: 30px;
        }

        .profile-content {
            white-space: pre-wrap;
            font-family: var(--font);
            font-size: 16px;
            line-height: 1.8;
        }

        .profile-content .section-title {
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-top: 40px;
            margin-bottom: 15px;
        }

        /* Полоски напряжения */
        .bar-wrapper {
            margin: 14px 0;
        }
        .bar-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .bar-track {
            height: 18px;
            background: var(--bar-empty);
            border-radius: 9px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--bar-full);
            border-radius: 9px;
            transition: width 1s ease;
        }

        .logout-link {
            display: inline-block;
            margin-top: 40px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: underline;
        }

        .footer-note {
            text-align: center;
            margin-top: 50px;
            font-size: 11px;
            color: #b0aca5;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .login-container {
                padding: 40px 25px;
            }
            .profile-container {
                padding: 35px 25px;
            }
        }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div class="login-container" id="loginScreen">
        <div class="logo">HR Audit System</div>
        <h1>Персональный профиль</h1>
        <p class="subtitle">Введите ваш индивидуальный код доступа для просмотра результатов диагностики</p>
        <input type="text" id="tokenInput" placeholder="Например: Иванов Иван-aB3xKq9" autocomplete="off">
        <button onclick="loadProfile()">Открыть профиль</button>
        <div class="error-message" id="errorMessage">Неверный код доступа. Проверьте токен и попробуйте снова.</div>
    </div>

    <!-- ЭКРАН ПРОФИЛЯ -->
    <div class="profile-container" id="profileScreen">
        <div class="header-line"></div>
        <div class="profile-content" id="profileContent"></div>
        <div class="logout-link" onclick="logout()">← Выйти и закрыть профиль</div>
    </div>

    <div class="footer-note" id="footerNote">Конфиденциально &nbsp;·&nbsp; HR Audit System &nbsp;·&nbsp; 2026</div>

    <script>
        // Загружаем зашифрованную базу данных
        let database = null;

        async function loadDatabase() {
            if (database) return;
            try {
                const response = await fetch('database.json');
                if (!response.ok) throw new Error('База данных не найдена');
                database = await response.json();
            } catch (e) {
                console.error('Ошибка загрузки базы:', e);
            }
        }

        function decryptProfile(encryptedBase64, token) {
            try {
                const key = CryptoJS.SHA256(token);
                const iv = CryptoJS.MD5(token);

                const encrypted = CryptoJS.enc.Base64.parse(encryptedBase64);

                const decrypted = CryptoJS.AES.decrypt(
                    { ciphertext: encrypted },
                    key,
                    { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
                );

                const decryptedText = decrypted.toString(CryptoJS.enc.Utf8);

                if (!decryptedText || decryptedText.length === 0) {
                    throw new Error('Расшифровка не удалась');
                }

                return decryptedText;
            } catch (e) {
                console.error('Ошибка расшифровки:', e);
                return null;
            }
        }

        function renderProfile(text) {
            // Простая обработка: заменяем разделители на HTML
            let html = text;

            // Экранируем HTML
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Жирный текст между **...**
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Разделительные линии
            html = html.replace(/={10,}/g, '<hr style="border:none;border-top:1px solid #e0dcd5;margin:30px 0;">');

            // Преобразуем графические полоски в HTML
            html = html.replace(/^([^:]+):\s*$/gm, function(match, label) {
                return '<div class="bar-wrapper"><div class="bar-label">' + label.trim() + '</div>';
            });

            html = html.replace(/^(█+)(░*)\s*(\d+%)$/gm, function(match, filled, empty, percent) {
                return '<div class="bar-track"><div class="bar-fill" style="width:' + percent + '"></div></div><span style="font-size:11px;color:#6b6b6b;">' + percent + '</span></div>';
            });

            // Если остались незакрытые bar-wrapper
            html = html.replace(/<div class="bar-wrapper">(?!.*<div class="bar-track")/g, '');

            // Заголовки секций
            html = html.replace(/^([А-ЯЁ][А-ЯЁ\s]+):$/gm, '<div class="section-title">$1</div>');

            // Переносы строк
            html = html.replace(/\n/g, '<br>');

            return html;
        }

        async function loadProfile() {
            await loadDatabase();

            const tokenInput = document.getElementById('tokenInput');
            const token = tokenInput.value.trim();
            const errorEl = document.getElementById('errorMessage');

            if (!token) {
                errorEl.classList.add('visible');
                return;
            }

            if (!database) {
                errorEl.textContent = 'Не удалось загрузить базу данных. Попробуйте обновить страницу.';
                errorEl.classList.add('visible');
                return;
            }

            // Ищем запись: извлекаем имя из токена (всё до последнего дефиса)
            const lastDash = token.lastIndexOf('-');
            if (lastDash === -1) {
                errorEl.classList.add('visible');
                return;
            }

            const nameFromToken = token.substring(0, lastDash);
            const encryptedData = database[nameFromToken];

            if (!encryptedData) {
                errorEl.classList.add('visible');
                return;
            }

            // Пробуем расшифровать
            const decrypted = decryptProfile(encryptedData, token);

            if (!decrypted) {
                errorEl.classList.add('visible');
                return;
            }

            // Проверяем, что расшифрованный текст содержит ожидаемые данные
            if (!decrypted.includes('ПРОФИЛЬ:')) {
                errorEl.classList.add('visible');
                return;
            }

            // Успех: скрываем экран входа, показываем профиль
            errorEl.classList.remove('visible');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('profileScreen').style.display = 'block';
            document.getElementById('footerNote').style.display = 'none';

            const content = renderProfile(decrypted);
            document.getElementById('profileContent').innerHTML = content;

            // Сохраняем токен в sessionStorage
            sessionStorage.setItem('hr_audit_token', token);
        }

        function logout() {
            sessionStorage.removeItem('hr_audit_token');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('profileScreen').style.display = 'none';
            document.getElementById('footerNote').style.display = 'block';
            document.getElementById('tokenInput').value = '';
            document.getElementById('errorMessage').classList.remove('visible');
        }

        // Восстановление сессии при перезагрузке
        window.addEventListener('load', async function() {
            const savedToken = sessionStorage.getItem('hr_audit_token');
            if (savedToken) {
                document.getElementById('tokenInput').value = savedToken;
                await loadProfile();
            }
        });

        // Enter для отправки
        document.getElementById('tokenInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loadProfile();
            }
        });
    </script>
</body>
</html>
