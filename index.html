<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytic Matrix | Персональный профиль</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #f9f8f5;
            --bg-card: #ffffff;
            --bg-glass: rgba(255,255,255,0.7);
            --border-light: rgba(0,0,0,0.06);
            --border-medium: rgba(0,0,0,0.1);
            --text-primary: #1a1a1a;
            --text-secondary: #6e6e6e;
            --text-tertiary: #999999;
            
            --accent-blue: #2563eb;
            --accent-blue-glow: rgba(37,99,235,0.25);
            --accent-red: #dc2626;
            --accent-red-glow: rgba(220,38,38,0.2);
            --accent-amber: #d97706;
            --accent-amber-glow: rgba(217,119,6,0.2);
            --accent-emerald: #059669;
            --accent-emerald-glow: rgba(5,150,105,0.2);
            --accent-violet: #7c3aed;
            --accent-violet-glow: rgba(124,58,237,0.2);
            
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.08);
            --shadow-xl: 0 30px 80px rgba(0,0,0,0.1);
            
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(180deg, #faf9f6 0%, #f5f3ef 30%, #f0ede8 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px 60px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 1050px; width: 100%; }

        /* ======== ШЛЮЗ ======== */
        #login-screen {
            margin-top: 12vh;
            text-align: center;
            background: var(--bg-card);
            padding: 55px 45px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-lg);
            max-width: 460px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            overflow: hidden;
        }

        #login-screen::before {
            content: '';
            position: absolute;
            top: -60px;
            left: -60px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, var(--accent-blue-glow), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: floatGlow 8s ease-in-out infinite;
        }

        #login-screen::after {
            content: '';
            position: absolute;
            bottom: -80px;
            right: -80px;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, var(--accent-violet-glow), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: floatGlow 10s ease-in-out infinite reverse;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(25px, -25px); }
        }

        .login-content { position: relative; z-index: 1; }

        .login-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-violet) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #fff;
            font-weight: 800;
            box-shadow: 0 12px 30px var(--accent-blue-glow);
        }

        .login-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-weight: 400;
        }

        .token-input {
            width: 100%;
            padding: 16px 20px;
            background: #f8f7f4;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            text-align: center;
            color: var(--text-primary);
            outline: none;
            transition: all var(--transition-fast);
            letter-spacing: 0.5px;
        }

        .token-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px var(--accent-blue-glow);
            background: #fff;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, #1d4ed8 100%);
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-md);
            letter-spacing: 0.8px;
            transition: all var(--transition-fast);
            box-shadow: 0 8px 25px var(--accent-blue-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 35px rgba(37,99,235,0.35);
        }

        .btn-primary:active { transform: translateY(0); }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            animation: btnShine 3s infinite;
        }

        @keyframes btnShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .error-msg {
            color: var(--accent-red);
            margin-top: 16px;
            display: none;
            font-size: 13px;
            font-weight: 500;
            background: rgba(220,38,38,0.05);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(220,38,38,0.15);
        }

        .error-msg.visible { display: block; }

        /* ======== ДАШБОРД ======== */
        #profile-screen {
            display: none;
            animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
        }

        .btn-back:hover {
            background: #fff;
            color: var(--text-primary);
            box-shadow: var(--shadow-md);
            transform: translateX(-2px);
        }

        .header-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 35px 40px;
            margin-bottom: 28px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .header-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-violet), var(--accent-emerald));
            border-radius: 3px 3px 0 0;
        }

        .header-name {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .header-role {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-blue);
            margin-top: 6px;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 28px;
        }

        @media (max-width: 860px) { .grid-2col { grid-template-columns: 1fr; } }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 35px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-smooth);
            position: relative;
        }

        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
        }

        /* Карточка рисков */
        .card-risk {
            border-left: 3px solid var(--accent-red);
            background: linear-gradient(135deg, rgba(220,38,38,0.02), var(--bg-card));
        }
        .card-risk .card-icon { background: linear-gradient(135deg, var(--accent-red), #b91c1c); }

        /* Карточка протокола */
        .card-protocol {
            border-left: 3px solid var(--accent-emerald);
            background: linear-gradient(135deg, rgba(5,150,105,0.02), var(--bg-card));
        }
        .card-protocol .card-icon { background: linear-gradient(135deg, var(--accent-emerald), #047857); }

        /* ======== УМНЫЙ ТЕКСТ ======== */
        .smart-section {
            margin-bottom: 20px;
        }

        .smart-section:last-child { margin-bottom: 0; }

        .smart-heading {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-blue);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .smart-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }

        .smart-block {
            background: #fafaf9;
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            border: 1px solid var(--border-light);
            font-size: 14px;
            line-height: 1.65;
            color: var(--text-primary);
            transition: all var(--transition-fast);
        }

        .smart-block:hover {
            background: #f5f4f1;
            transform: translateX(3px);
        }

        .smart-block strong {
            color: var(--accent-blue);
            font-weight: 700;
        }

        .smart-quote {
            background: linear-gradient(135deg, rgba(124,58,237,0.04), rgba(37,99,235,0.02));
            border-left: 3px solid var(--accent-violet);
            padding: 18px 22px;
            font-size: 14px;
            font-style: italic;
            color: var(--text-primary);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            margin: 16px 0;
            font-weight: 500;
        }

        /* ======== ГРАФИКИ ======== */
        .metric-item {
            margin-bottom: 22px;
        }

        .metric-item:last-child { margin-bottom: 0; }

        .metric-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .metric-label-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .metric-value-text {
            font-size: 22px;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.5px;
        }

        .metric-track {
            height: 12px;
            background: #e8e5df;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .metric-fill {
            height: 100%;
            border-radius: 6px;
            width: 0;
            transition: width 1.8s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        .metric-fill.animated { animation: glowPulse 3s ease-in-out infinite; }

        @keyframes glowPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.25); }
        }

        .metric-desc-text {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 6px;
        }

        /* ======== ТЕХНИЧЕСКИЕ БЕЙДЖИ ======== */
        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .badge {
            background: #f5f4f1;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
            font-family: 'SF Mono', 'Consolas', monospace;
            transition: all var(--transition-fast);
        }

        .badge:hover {
            background: #fff;
            border-color: var(--border-medium);
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ======== ЭКРАН ВХОДА ======== -->
    <div id="login-screen">
        <div class="login-content">
            <div class="login-logo">AM</div>
            <div class="login-title">Аналитическая Матрица</div>
            <div class="login-subtitle">Введите персональный ключ доступа для расшифровки вашего профиля</div>
            <input type="text" class="token-input" id="token-input" placeholder="Иванов Иван-aB3xKq9" autocomplete="off">
            <button class="btn-primary" onclick="unlockProfile()">Расшифровать профиль</button>
            <div class="error-msg" id="error-msg"></div>
        </div>
    </div>

    <!-- ======== ЭКРАН ПРОФИЛЯ ======== -->
    <div id="profile-screen">
        <div class="top-bar">
            <button class="btn-back" onclick="lockProfile()">
                <span>←</span> Закрыть профиль
            </button>
        </div>

        <div class="header-card">
            <div class="header-name" id="profile-name">—</div>
            <div class="header-role" id="profile-role">—</div>
        </div>

        <div class="grid-2col">
            <div class="card">
                <div class="card-header">
                    <div class="card-icon" style="background: linear-gradient(135deg, var(--accent-blue), var(--accent-violet));">▸</div>
                    <div class="card-title">Рабочая модель</div>
                </div>
                <div id="block-legend"></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-icon" style="background: linear-gradient(135deg, var(--accent-amber), #ea580c);">◈</div>
                    <div class="card-title">Карта натяжения</div>
                </div>
                <div id="block-metrics"></div>
            </div>
        </div>

        <div class="card card-risk" style="margin-bottom: 28px;">
            <div class="card-header" style="border-bottom-color: rgba(220,38,38,0.1);">
                <div class="card-icon">⚠</div>
                <div class="card-title" style="color: var(--accent-red);">Ключевая зона напряжения</div>
            </div>
            <div id="block-paradox"></div>
        </div>

        <div class="card card-protocol" style="margin-bottom: 28px;" id="card-protocol-wrap">
            <div class="card-header" style="border-bottom-color: rgba(5,150,105,0.1);">
                <div class="card-icon">◆</div>
                <div class="card-title" style="color: var(--accent-emerald);">Рекомендованный эксперимент</div>
            </div>
            <div id="block-protocol"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-icon" style="background: linear-gradient(135deg, #64748b, #475569);">⊡</div>
                <div class="card-title">Технические параметры</div>
            </div>
            <div class="badge-row" id="block-tech"></div>
        </div>
    </div>

</div>

<script>
    let encryptedDB = null;
    let animationQueue = [];

    window.addEventListener('load', async () => {
        try {
            const resp = await fetch('database.json');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            encryptedDB = await resp.json();
        } catch (e) {
            showError('База данных недоступна. Обновите страницу позже.');
        }

        const savedToken = sessionStorage.getItem('am_token');
        if (savedToken) {
            document.getElementById('token-input').value = savedToken;
            unlockProfile();
        }
    });

    document.getElementById('token-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') unlockProfile();
    });

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.add('visible');
    }

    function hideError() {
        document.getElementById('error-msg').classList.remove('visible');
    }

    function unlockProfile() {
        hideError();
        const token = document.getElementById('token-input').value.trim();

        if (!encryptedDB) { showError('База данных ещё загружается.'); return; }
        if (!token) { showError('Введите токен доступа.'); return; }

        const lastDash = token.lastIndexOf('-');
        if (lastDash === -1) { showError('Неверный формат токена.'); return; }

        const userId = token.substring(0, lastDash);
        const encryptedBase64 = encryptedDB[userId] || encryptedDB[userId.replace(/_/g, ' ')] || encryptedDB[userId.replace(/ /g, '_')];

        if (!encryptedBase64) { showError('Субъект не найден.'); return; }

        let rawText;
        try {
            const tokenBytes = CryptoJS.enc.Utf8.parse(token);
            const key = CryptoJS.SHA256(tokenBytes);
            const iv = CryptoJS.MD5(tokenBytes);
            const decrypted = CryptoJS.AES.decrypt(encryptedBase64, key, { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
            rawText = decrypted.toString(CryptoJS.enc.Utf8);
            if (!rawText || !rawText.includes('ПРОФИЛЬ:')) throw new Error();
        } catch (e) {
            showError('Ключ недействителен.'); return;
        }

        sessionStorage.setItem('am_token', token);
        renderDashboard(rawText);
    }

    function lockProfile() {
        sessionStorage.removeItem('am_token');
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('token-input').value = '';
        hideError();
        animationQueue = [];
    }

    function parseSections(raw) {
        const cleaned = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        const blocks = cleaned.split(/={10,}/);
        
        let header = '', tech = '', act1 = '', map = '', act2 = '', act3 = '';
        
        for (const block of blocks) {
            const trimmed = block.trim();
            if (trimmed.startsWith('ПРОФИЛЬ:')) header = trimmed;
            else if (trimmed.includes('ТЕХНИЧЕСКИЙ ДОПУСК') || trimmed.includes('КАРТА НАПРЯЖЕНИЯ') && !map) {
                if (trimmed.includes('ТЕХНИЧЕСКИЙ ДОПУСК')) tech = trimmed;
                if (trimmed.includes('КАРТА НАПРЯЖЕНИЯ')) map = trimmed;
            }
            else if (trimmed.includes('ЧТО ЗАБИРАЕТ ВАШУ ЭНЕРГИЮ') || trimmed.includes('ГИПОТЕЗА СИСТЕМЫ')) act2 = trimmed;
            else if (trimmed.includes('ЧТО МОЖНО ПОПРОБОВАТЬ') || trimmed.includes('Эксперимент')) act3 = trimmed;
            else if (trimmed.includes('ВАШ ПОРТРЕТ') || trimmed.includes('Система видит вас')) act1 = trimmed;
        }
        
        return { header, tech, act1, map, act2, act3 };
    }

    function renderDashboard(rawText) {
        const sections = parseSections(rawText);

        // Имя и должность
        const nameMatch = sections.header.match(/ПРОФИЛЬ:\s*(.+)/);
        const roleMatch = sections.header.match(/ДОЛЖНОСТЬ:\s*(.+)/);
        document.getElementById('profile-name').textContent = nameMatch ? nameMatch[1].trim() : '—';
        document.getElementById('profile-role').textContent = roleMatch ? roleMatch[1].trim() : '—';

        // Технические бейджи
        const techLines = sections.tech.split('\n').filter(l => l.trim() && !l.includes('ТЕХНИЧЕСКИЙ'));
        document.getElementById('block-tech').innerHTML = techLines.map(l => `<span class="badge">${l.trim()}</span>`).join('');

        // Акт 1
        document.getElementById('block-legend').innerHTML = formatSmartText(sections.act1, 'var(--accent-blue)');

        // Метрики
        document.getElementById('block-metrics').innerHTML = buildMetrics(sections.map);

        // Акт 2
        document.getElementById('block-paradox').innerHTML = formatSmartText(sections.act2, 'var(--accent-red)');

        // Акт 3
        if (sections.act3) {
            document.getElementById('block-protocol').innerHTML = formatSmartText(sections.act3, 'var(--accent-emerald)');
            document.getElementById('card-protocol-wrap').style.display = 'block';
        } else {
            document.getElementById('card-protocol-wrap').style.display = 'none';
        }

        // Переключение экранов
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('profile-screen').style.display = 'block';
        document.getElementById('profile-screen').style.animation = 'none';
        document.getElementById('profile-screen').offsetHeight;
        document.getElementById('profile-screen').style.animation = 'fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1)';

        // Запуск анимаций графиков
        setTimeout(animateMetrics, 200);
    }

    function formatSmartText(text, accentColor) {
        if (!text) return '<div class="smart-block" style="color:var(--text-tertiary);">Нет данных</div>';

        const lines = text.split('\n').map(l => l.trim()).filter(l => l);
        let html = '';
        let currentSection = '';

        for (const line of lines) {
            const escaped = line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const withBold = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            if (/^[А-ЯЁ][А-ЯЁ\s\-]+:$/.test(withBold) && withBold.length < 60) {
                html += `<div class="smart-heading">${withBold.replace(/:$/, '')}</div>`;
            }
            else if ((withBold.startsWith('«') || withBold.startsWith('"')) && withBold.length > 20) {
                html += `<div class="smart-quote">${withBold}</div>`;
            }
            else {
                html += `<div class="smart-block">${withBold}</div>`;
            }
        }

        return html;
    }

    function buildMetrics(mapText) {
        if (!mapText) return '<div class="smart-block" style="color:var(--text-tertiary);">Метрики не найдены</div>';

        const lines = mapText.split('\n').filter(l => l.trim());
        let html = '';
        let metricIndex = 0;

        for (const line of lines) {
            const match = line.match(/^(.+?):\s*\n?\s*[█░]+\s*(\d+)%$/);
            if (match) {
                const label = match[1].trim();
                const percent = parseInt(match[2]);
                
                let color, glow;
                if (percent >= 80) { color = '#dc2626'; glow = 'rgba(220,38,38,0.4)'; }
                else if (percent >= 50) { color = '#d97706'; glow = 'rgba(217,119,6,0.35)'; }
                else if (percent <= 20) { color = '#059669'; glow = 'rgba(5,150,105,0.3)'; }
                else { color = '#2563eb'; glow = 'rgba(37,99,235,0.3)'; }

                html += `
                    <div class="metric-item">
                        <div class="metric-header-row">
                            <span class="metric-label-text">${label}</span>
                            <span class="metric-value-text" style="color:${color};">${percent}%</span>
                        </div>
                        <div class="metric-track">
                            <div class="metric-fill animated" id="metric-${metricIndex}" style="background:${color};box-shadow:0 0 12px ${glow};"></div>
                        </div>
                    </div>`;
                
                animationQueue.push({ id: `metric-${metricIndex}`, width: percent });
                metricIndex++;
            }
        }

        return html || '<div class="smart-block" style="color:var(--text-tertiary);">Формат метрик не распознан</div>';
    }

    function animateMetrics() {
        animationQueue.forEach(item => {
            const el = document.getElementById(item.id);
            if (el) el.style.width = item.width + '%';
        });
        animationQueue = [];
    }
</script>
