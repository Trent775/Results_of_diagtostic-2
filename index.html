<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytic Matrix | Персональный профиль</title>
    <!-- Библиотека для шифрования -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Базовые цвета (светлая премиальная тема) */
            --bg-base: #f9f9f6;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border-subtle: rgba(0, 0, 0, 0.05);
            --border-medium: rgba(0, 0, 0, 0.08);
            
            /* Текст */
            --text-primary: #1a1a1a;
            --text-secondary: #4a4a4a;
            --text-tertiary: #888888;
            
            /* Акценты */
            --accent-blue: #2563eb;
            --accent-blue-glow: rgba(37, 99, 235, 0.2);
            --accent-red: #dc2626;
            --accent-red-glow: rgba(220, 38, 38, 0.15);
            --accent-amber: #d97706;
            --accent-amber-glow: rgba(217, 119, 6, 0.15);
            --accent-emerald: #059669;
            --accent-emerald-glow: rgba(5, 150, 105, 0.15);
            --accent-violet: #7c3aed;
            --accent-violet-glow: rgba(124, 58, 237, 0.15);
            
            /* Тени и скругления */
            --shadow-xs: 0 1px 3px rgba(0, 0, 0, 0.03);
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 10px 32px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 24px 64px rgba(0, 0, 0, 0.06);
            --radius-xs: 8px; 
            --radius-sm: 12px; 
            --radius-md: 20px;
            --radius-lg: 28px;
            
            /* Анимации */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 30px 20px;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }

        .container { max-width: 1040px; width: 100%; position: relative; }

        /* ================= Экран входа ================= */
        #login-screen {
            margin-top: 15vh; 
            text-align: center; 
            max-width: 420px;
            margin-left: auto; 
            margin-right: auto; 
            position: relative;
        }
        
        .login-orb {
            position: absolute; border-radius: 50%; pointer-events: none; z-index: 0;
            filter: blur(40px);
            animation: orbFloat 10s ease-in-out infinite alternate;
        }
        .login-orb.orb-1 {
            width: 220px; height: 220px; top: -60px; left: -80px;
            background: var(--accent-blue-glow);
        }
        .login-orb.orb-2 {
            width: 280px; height: 280px; bottom: -100px; right: -100px;
            background: var(--accent-violet-glow);
            animation-delay: -3s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -40px) scale(1.1); }
        }

        .login-card {
            position: relative; z-index: 1;
            background: var(--bg-glass); 
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            padding: 48px 40px; 
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle); 
            box-shadow: var(--shadow-lg);
        }
        
        .login-icon {
            width: 56px; height: 56px; margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-violet) 100%);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800; color: #fff;
            box-shadow: 0 8px 24px var(--accent-blue-glow);
        }
        
        .login-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
        .login-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; }

        .token-input {
            width: 100%; padding: 16px 20px; 
            background: #ffffff;
            border: 1px solid var(--border-medium); 
            border-radius: var(--radius-xs);
            font-family: 'JetBrains Mono', monospace; 
            font-size: 14px; text-align: center; 
            color: var(--text-primary); outline: none;
            transition: all 0.3s var(--ease-out-expo);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        
        .token-input:focus { 
            border-color: var(--accent-blue); 
            box-shadow: 0 0 0 4px var(--accent-blue-glow); 
        }

        .btn-unlock {
            width: 100%; padding: 16px; margin-top: 20px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, #1e40af 100%);
            color: #fff; border: none; font-size: 15px; font-weight: 600;
            cursor: pointer; border-radius: var(--radius-xs); letter-spacing: 0.5px;
            transition: all 0.3s var(--ease-out-expo);
            box-shadow: 0 8px 24px var(--accent-blue-glow);
            position: relative; overflow: hidden;
        }
        
        .btn-unlock:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(37, 99, 235, 0.3); }
        .btn-unlock:active { transform: translateY(0); }
        
        .btn-unlock::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.2) 50%, transparent 60%);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .error-msg {
            color: var(--accent-red); margin-top: 16px; display: none;
            font-size: 13px; font-weight: 500;
            background: rgba(220,38,38,0.05); padding: 12px 16px;
            border-radius: var(--radius-xs); border: 1px solid rgba(220,38,38,0.15);
        }
        .error-msg.visible { display: block; animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* ================= ЭКРАН ПРОФИЛЯ ================= */
        #profile-screen { display: none; }
        
        .reveal-anim {
            opacity: 0; transform: translateY(40px);
            animation: revealUp 0.8s var(--ease-out-expo) forwards;
        }
        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .btn-exit {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-medium); color: var(--text-secondary);
            padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.3s var(--ease-out-expo);
            box-shadow: var(--shadow-xs);
        }
        .btn-exit:hover { background: #fff; color: var(--text-primary); box-shadow: var(--shadow-sm); transform: translateX(-3px); }

        .hero-card {
            background: var(--bg-glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-radius: var(--radius-lg); padding: 40px 48px; margin-bottom: 24px;
            border: 1px solid var(--border-subtle); box-shadow: var(--shadow-md);
            position: relative; overflow: hidden;
        }
        .hero-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-violet), var(--accent-emerald), var(--accent-amber), var(--accent-blue));
            background-size: 200% 100%;
            animation: gradientFlow 5s linear infinite;
        }
        
        .hero-name { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-primary); }
        .hero-role { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-blue); margin-top: 6px; }

        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        @media (max-width: 800px) { .grid-2col { grid-template-columns: 1fr; } }

        .card {
            background: var(--bg-glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-radius: var(--radius-md); padding: 36px;
            border: 1px solid var(--border-subtle); box-shadow: var(--shadow-sm);
            transition: transform 0.4s var(--ease-out-expo), box-shadow 0.4s var(--ease-out-expo);
        }
        .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-4px); }

        .card-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 1px solid var(--border-medium);
        }
        .card-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .card-dot.dot-blue { background: var(--accent-blue); box-shadow: 0 0 10px var(--accent-blue-glow); }
        .card-dot.dot-amber { background: var(--accent-amber); box-shadow: 0 0 10px var(--accent-amber-glow); }
        .card-dot.dot-red { background: var(--accent-red); box-shadow: 0 0 10px var(--accent-red-glow); }
        .card-dot.dot-emerald { background: var(--accent-emerald); box-shadow: 0 0 10px var(--accent-emerald-glow); }
        .card-dot.dot-gray { background: #999; }
        
        .card-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary); }

        /* Специфичные акценты карточек */
        .card-risk { border-left: 4px solid var(--accent-red); background: linear-gradient(135deg, rgba(220,38,38,0.015) 0%, var(--bg-glass) 50%); margin-bottom: 24px; }
        .card-protocol { border-left: 4px solid var(--accent-emerald); background: linear-gradient(135deg, rgba(5,150,105,0.015) 0%, var(--bg-glass) 50%); margin-bottom: 24px; }
        .card-tech { margin-bottom: 24px; }

        /* ================= ТЕКСТОВЫЕ БЛОКИ ================= */
        .text-block { 
            font-size: 15px; 
            line-height: 1.7; 
            color: var(--text-primary); 
            max-width: 680px; 
        }
        
        .text-block p { margin-bottom: 16px; }
        .text-block p:last-child { margin-bottom: 0; }
        
        .text-block strong { color: var(--text-primary); font-weight: 700; }
        
        /* Списки */
        .text-block ul, .text-block ol { 
            margin: 16px 0 16px 20px; 
            padding-left: 0; 
        }
        .text-block li { 
            margin-bottom: 12px; 
            padding-left: 8px;
        }
        .text-block li::marker {
            color: var(--accent-blue);
            font-weight: 700;
        }

        /* Цитаты и примеры */
        .text-quote {
            background: rgba(37, 99, 235, 0.03);
            border-left: 3px solid var(--accent-blue);
            padding: 18px 24px; 
            font-size: 15px; 
            font-style: italic; 
            color: var(--text-secondary);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
            margin: 20px 0; 
        }

        /* ================= МЕТРИКИ (Графики) ================= */
        .metric-row { margin-bottom: 24px; }
        .metric-row:last-child { margin-bottom: 0; }
        
        .metric-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
        .metric-name { font-size: 14px; font-weight: 600; color: var(--text-primary); max-width: 75%; line-height: 1.3;}
        .metric-pct { font-size: 22px; font-weight: 800; letter-spacing: -1px; font-family: 'JetBrains Mono', monospace; }
        
        .metric-bar { height: 8px; background: rgba(0,0,0,0.05); border-radius: 4px; overflow: hidden; }
        .metric-fill { height: 100%; border-radius: 4px; width: 0; transition: width 1.5s var(--ease-out-expo); }
        
        /* Пульсация графиков */
        .metric-fill.animated { animation: barPulse 3s infinite alternate; }
        @keyframes barPulse { 
            0% { filter: brightness(1); } 
            100% { filter: brightness(1.2) drop-shadow(0 0 2px rgba(255,255,255,0.3)); } 
        }

        /* ================= ТЕГИ (Бейджи) ================= */
        .badge-wrap { display: flex; flex-wrap: wrap; gap: 10px; }
        .badge {
            background: #ffffff; 
            padding: 8px 16px; 
            border-radius: 30px;
            font-size: 13px; font-weight: 500; color: var(--text-secondary);
            border: 1px solid var(--border-medium);
            transition: all 0.2s ease;
            box-shadow: var(--shadow-xs);
        }
        .badge:hover { 
            background: var(--accent-blue-glow); 
            border-color: var(--accent-blue); 
            color: var(--accent-blue); 
            transform: translateY(-2px); 
        }

        @media (max-width: 600px) {
            .hero-card { padding: 30px 24px; }
            .hero-name { font-size: 24px; }
            .card { padding: 24px; }
            .login-card { padding: 40px 24px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- ЭКРАН ВХОДА -->
    <div id="login-screen">
        <div class="login-orb orb-1"></div>
        <div class="login-orb orb-2"></div>
        <div class="login-card">
            <div class="login-icon">AM</div>
            <div class="login-title">Analytic Matrix</div>
            <div class="login-subtitle">Персональный профиль сотрудника</div>
            <input type="text" class="token-input" id="token-input" placeholder="Введите персональный токен" autocomplete="off">
            <button class="btn-unlock" onclick="unlock()">Открыть профиль</button>
            <div class="error-msg" id="error-msg"></div>
        </div>
    </div>

    <!-- ЭКРАН ПРОФИЛЯ -->
    <div id="profile-screen">
        <div class="top-bar reveal-anim" style="animation-delay: 0s;">
            <button class="btn-exit" onclick="lock()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-3px"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Закрыть профиль
            </button>
        </div>

        <div class="hero-card reveal-anim" style="animation-delay: 0.1s;">
            <div class="hero-name" id="h-name">—</div>
            <div class="hero-role" id="h-role">—</div>
        </div>

        <div class="grid-2col">
            <div class="card reveal-anim" style="animation-delay: 0.2s;">
                <div class="card-header">
                    <div class="card-dot dot-blue"></div>
                    <div class="card-label">Рабочая модель</div>
                </div>
                <div id="block-act1"></div>
            </div>

            <div class="card reveal-anim" style="animation-delay: 0.3s;">
                <div class="card-header">
                    <div class="card-dot dot-amber"></div>
                    <div class="card-label">Карта натяжения</div>
                </div>
                <div id="block-metrics"></div>
            </div>
        </div>

        <div class="card card-risk reveal-anim" style="animation-delay: 0.4s;">
            <div class="card-header">
                <div class="card-dot dot-red"></div>
                <div class="card-label" style="color:var(--accent-red);">Зона напряжения</div>
            </div>
            <div id="block-act2"></div>
        </div>

        <div class="card card-protocol reveal-anim" id="wrap-act3" style="animation-delay: 0.5s;">
            <div class="card-header">
                <div class="card-dot dot-emerald"></div>
                <div class="card-label" style="color:var(--accent-emerald);">Рекомендованный эксперимент</div>
            </div>
            <div id="block-act3"></div>
        </div>

        <div class="card card-tech reveal-anim" id="wrap-tech" style="animation-delay: 0.6s; display:none;">
            <div class="card-header">
                <div class="card-dot dot-gray"></div>
                <div class="card-label">Технические параметры</div>
            </div>
            <div class="badge-wrap" id="block-tech"></div>
        </div>
    </div>
</div>

<script>
    let DB = null;
    let TECH = null;
    let metricQueue = [];

    // Инициализация при загрузке
    window.addEventListener('load', async () => {
        try {
            const resDB = await fetch('database.json');
            if (resDB.ok) DB = await resDB.json();
        } catch (e) {
            console.warn("DB load failed");
        }
        
        try {
            const resTech = await fetch('tech_info.json');
            if (resTech.ok) TECH = await resTech.json();
        } catch (e) {
            console.warn("Tech info load failed");
        }
        
        const savedToken = sessionStorage.getItem('am_token');
        if (savedToken && DB) { 
            document.getElementById('token-input').value = savedToken; 
            unlock(); 
        }
    });

    document.getElementById('token-input').addEventListener('keydown', e => { 
        if (e.key === 'Enter') unlock(); 
    });

    function showErr(msg) { 
        const el = document.getElementById('error-msg'); 
        el.textContent = msg; 
        el.classList.remove('visible'); 
        void el.offsetWidth; 
        el.classList.add('visible'); 
    }
    
    function hideErr() { 
        document.getElementById('error-msg').classList.remove('visible'); 
    }

    // Умный поиск ключей (отсекает цифры, спецсимволы, пробелы)
    function fuzzyMatchKey(dictionary, targetKey) {
        if (!dictionary || !targetKey) return null;
        if (dictionary[targetKey]) return dictionary[targetKey]; 

        const normalize = str => str.toLowerCase().replace(/[^а-яёa-z]/gi, '');
        const targetNorm = normalize(targetKey);
        
        for (const key in dictionary) {
            const keyNorm = normalize(key);
            if (keyNorm === targetNorm) return dictionary[key];
            if (targetNorm.length > 3 && keyNorm.includes(targetNorm)) return dictionary[key];
            if (keyNorm.length > 3 && targetNorm.includes(keyNorm)) return dictionary[key];
        }
        return null;
    }

    function unlock() {
        hideErr();
        const rawToken = document.getElementById('token-input').value;
        const token = rawToken.trim(); 
        
        if (!DB) { showErr('База данных еще загружается...'); return; }
        if (!token) { showErr('Пожалуйста, введите токен.'); return; }
        
        const lastDashIdx = token.lastIndexOf('-');
        if (lastDashIdx === -1) { showErr('Неверный формат токена.'); return; }
        
        const employeeName = token.substring(0, lastDashIdx).trim();
        const encryptedData = fuzzyMatchKey(DB, employeeName);
        
        if (!encryptedData) { showErr('Сотрудник не найден в базе данных.'); return; }

        let decryptedText;
        try {
            const tokenBytes = CryptoJS.enc.Utf8.parse(token);
            const key = CryptoJS.SHA256(tokenBytes); 
            const iv = CryptoJS.MD5(tokenBytes);
            const decrypted = CryptoJS.AES.decrypt(encryptedData, key, { 
                iv: iv, 
                mode: CryptoJS.mode.CBC, 
                padding: CryptoJS.pad.Pkcs7 
            });
            decryptedText = decrypted.toString(CryptoJS.enc.Utf8);
            if (!decryptedText || decryptedText.length === 0) throw new Error("Empty decryption");
        } catch (e) { 
            showErr('Ключ недействителен. Проверьте правильность токена.'); 
            return; 
        }

        sessionStorage.setItem('am_token', token);
        renderProfile(decryptedText, employeeName);
    }

    function lock() {
        sessionStorage.removeItem('am_token');
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('token-input').value = '';
        hideErr();
        metricQueue = [];
    }

    // Базовое экранирование HTML
    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }

    // Умный рендер текста (предотвращение "текстового кома")
    // Разделяет текст на абзацы по двойному переносу строки, затем парсит списки
    function smartFormat(text) {
        if (!text || text.trim().length < 5) return '<div class="text-block"><p style="color:var(--text-tertiary);">Нет данных</p></div>';

        let html = '';
        // Разбиваем текст на блоки (абзацы/списки), разделенные пустой строкой
        const blocks = text.split(/\n\s*\n/); 
        
        for (let block of blocks) {
            block = block.trim();
            if (!block) continue;
            
            // Если блок - маркированный список (есть строки, начинающиеся с • или -)
            if (/^\s*[-•–*]\s+/m.test(block)) {
                html += '<ul>';
                // Разбиваем блок по маркерам
                const items = block.split(/^\s*[-•–*]\s+/m).filter(i => i.trim());
                for (let item of items) {
                    // Убираем жесткие переносы строк внутри одного пункта меню
                    item = item.replace(/\n/g, ' ').trim();
                    html += `<li>${escapeHtml(item)}</li>`;
                }
                html += '</ul>';
            }
            // Если блок - нумерованный список (есть строки, начинающиеся с цифры и точки)
            else if (/^\s*\d+[\.\)]\s+/m.test(block)) {
                html += '<ol>';
                const items = block.split(/^\s*\d+[\.\)]\s+/m).filter(i => i.trim());
                let counter = 1;
                for (let item of items) {
                    item = item.replace(/\n/g, ' ').trim();
                    // Восстанавливаем номер
                    html += `<li>${escapeHtml(item)}</li>`;
                    counter++;
                }
                html += '</ol>';
            }
            // Если блок - цитата
            else if (block.startsWith('«') || block.startsWith('"') || block.startsWith('>')) {
                block = block.replace(/\n/g, ' ').replace(/^[>«"]\s*|\s*[»"]$/g, '').trim();
                html += `<div class="text-quote">${escapeHtml(block)}</div>`;
            }
            // Обычный абзац
            else {
                // Склеиваем разорванные строки внутри абзаца в один сплошной текст
                block = block.replace(/\n/g, ' ').trim();
                html += `<p>${escapeHtml(block)}</p>`;
            }
        }
        
        return `<div class="text-block">${html}</div>`;
    }

    // Жесткий экстрактор метрик. Парсит только то, что связано с графиком.
    function extractMetrics(lines) {
        const metrics = [];
        let lastLabel = '';
        
        for (let line of lines) {
            let cleanLine = line.trim();
            if (!cleanLine) continue;
            
            // Защита: как только дошли до инструкции "Как читать карту" - останавливаем парсинг
            if (cleanLine.toUpperCase().includes('КАК ЧИТАТЬ ЭТУ КАРТУ') || cleanLine.includes('Первая полоска')) {
                break;
            }
            
            // Ищем строку с полоской прогресса и процентами (например: ██████░░░ 10%)
            if (/[█░]/.test(cleanLine) && cleanLine.includes('%')) {
                const pctMatch = cleanLine.match(/(\d{1,3})\s*%/);
                if (pctMatch && lastLabel) {
                    const val = parseInt(pctMatch[1], 10);
                    // Добавляем метрику, если значение корректно
                    if (val >= 0 && val <= 100) {
                        metrics.push({ label: lastLabel, value: val });
                    }
                    lastLabel = ''; // Сбрасываем метку после использования
                }
            } else {
                // Если это не полоска и не разделитель, запоминаем как возможное название графика
                if (!cleanLine.startsWith('===') && !cleanLine.toUpperCase().includes('КАРТА НАПРЯЖЕНИЯ')) {
                    // Очищаем от двоеточий на конце
                    lastLabel = cleanLine.replace(/[:\-]+$/, '').trim();
                }
            }
        }
        return metrics;
    }

    function renderProfile(rawText, employeeName) {
        const sections = { portrait: [], tension: [], metrics: [], experiment: [] };
        let currentSection = null; 
        let name = employeeName;
        let role = 'Сотрудник';

        const lines = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
        
        for (const line of lines) {
            const upperLine = line.trim().toUpperCase();

            // Извлечение заголовка (Имя / Должность)
            if (upperLine.startsWith('ПРОФИЛЬ:')) { 
                name = line.replace(/^ПРОФИЛЬ:/i, '').trim(); 
                continue; 
            }
            if (upperLine.startsWith('ДОЛЖНОСТЬ:')) { 
                role = line.replace(/^ДОЛЖНОСТЬ:/i, '').trim(); 
                continue; 
            }
            
            // Смена секций по ключевым заголовкам
            if (upperLine.includes('ВАШ ПОРТРЕТ')) { currentSection = 'portrait'; continue; }
            if (upperLine.includes('ЧТО ЗАБИРАЕТ ВАШУ ЭНЕРГИЮ') || upperLine.includes('ГИПОТЕЗА СИСТЕМЫ')) { currentSection = 'tension'; continue; }
            if (upperLine.includes('КАРТА НАПРЯЖЕНИЯ')) { currentSection = 'metrics'; continue; }
            if (upperLine.includes('КАК ЭТО МОЖЕТ ВЫГЛЯДЕТЬ')) { currentSection = 'tension_example'; continue; }
            if (upperLine.includes('ЧТО МОЖНО ПОПРОБОВАТЬ') || upperLine.includes('ЭКСПЕРИМЕНТ')) { currentSection = 'experiment'; continue; }
            
            // Сохраняем строки в нужный раздел, игнорируя разделители "==="
            if (currentSection && !line.trim().startsWith('===')) {
                if (currentSection === 'tension_example') {
                    sections['tension'].push(line); // Склеиваем гипотезу и пример в один блок
                } else {
                    sections[currentSection].push(line);
                }
            }
        }

        // Обновление UI
        document.getElementById('h-name').textContent = name;
        document.getElementById('h-role').textContent = role;

        document.getElementById('block-act1').innerHTML = smartFormat(sections.portrait.join('\n'));
        document.getElementById('block-act2').innerHTML = smartFormat(sections.tension.join('\n'));
        
        const experimentText = sections.experiment.join('\n');
        if (experimentText.trim().length > 10) {
            document.getElementById('block-act3').innerHTML = smartFormat(experimentText);
            document.getElementById('wrap-act3').style.display = 'block';
        } else {
            document.getElementById('wrap-act3').style.display = 'none';
        }

        // Рендер метрик
        const metrics = extractMetrics(sections.metrics);
        renderMetricsBlock(metrics);

        // Рендер технических параметров
        renderTechBlock(name);

        // Показ экранов и запуск анимаций
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('profile-screen').style.display = 'block';

        setTimeout(() => {
            metricQueue.forEach(item => {
                const el = document.getElementById(item.id);
                if (el) el.style.width = item.width + '%';
            });
            metricQueue = [];
        }, 400);
    }

    function renderMetricsBlock(metrics) {
        const container = document.getElementById('block-metrics');
        if (!metrics || metrics.length === 0) {
            container.innerHTML = '<div class="text-block"><p style="color:var(--text-tertiary);">Метрики не обнаружены.</p></div>';
            return;
        }

        let html = '';
        metrics.forEach((m, i) => {
            let color, glow;
            if (m.value >= 80) { color = 'var(--accent-red)'; glow = 'var(--accent-red-glow)'; }
            else if (m.value >= 50) { color = 'var(--accent-amber)'; glow = 'var(--accent-amber-glow)'; }
            else if (m.value >= 20) { color = 'var(--accent-blue)'; glow = 'var(--accent-blue-glow)'; }
            else { color = 'var(--accent-emerald)'; glow = 'var(--accent-emerald-glow)'; }
            
            html += `
                <div class="metric-row">
                    <div class="metric-top">
                        <span class="metric-name">${escapeHtml(m.label)}</span>
                        <span class="metric-pct" style="color:${color};">${m.value}%</span>
                    </div>
                    <div class="metric-bar">
                        <div class="metric-fill animated" id="m-${i}" style="background:${color}; box-shadow:0 0 12px ${glow};"></div>
                    </div>
                </div>`;
            metricQueue.push({ id: `m-${i}`, width: m.value });
        });
        container.innerHTML = html;
    }

    function renderTechBlock(employeeName) {
        const wrap = document.getElementById('wrap-tech');
        const container = document.getElementById('block-tech');
        
        const info = fuzzyMatchKey(TECH, employeeName);
        
        if (!info) {
            wrap.style.display = 'none';
            return;
        }

        wrap.style.display = 'block';
        const badges = [];
        
        if (info.status) badges.push(`Статус: ${info.status}`);
        if (info.medianTime) badges.push(`Время ответа: ${info.medianTime}`);
        if (info.blurCount !== undefined) badges.push(`Смена вкладок: ${info.blurCount}`);
        if (info.flatlining) badges.push(`Паттерн: Flatlining`);
        if (info.discProfile) badges.push(`DISC: ${info.discProfile}`);
        if (info.dominantScales && Array.isArray(info.dominantScales)) {
            info.dominantScales.forEach(scale => badges.push(scale));
        }

        container.innerHTML = badges.map(t => `<span class="badge">${escapeHtml(t)}</span>`).join('');
    }
</script>
